name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'ga'

    - name: Restore dependencies
      run: dotnet restore src/EudicSyncToMaiMemo.slnx

    - name: Build
      run: dotnet build src/EudicSyncToMaiMemo.slnx --no-restore

    - name: Test
      run: dotnet test src/EudicSyncToMaiMemo.slnx --no-build --verbosity normal
