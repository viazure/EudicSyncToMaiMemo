name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'stable'

      - name: Publish
        run: |
          dotnet publish src/EudicSyncToMaiMemo/EudicSyncToMaiMemo.csproj `
            -c Release -r win-x64 --self-contained true `
            /p:PublishSingleFile=true `
            -o ./artifacts/publish
          Compress-Archive -Path ./artifacts/publish/* `
            -DestinationPath ./artifacts/EudicSyncToMaiMemo-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/EudicSyncToMaiMemo-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
